
[www]
user = www-data
group = www-data

; IMPORTANT (fix 502): bind on IPv4 explicitly
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

clear_env = yes
catch_workers_output = yes
decorate_workers_output = no
